<!-- Custom masthead: name left, nav right, separated by 1px border grid -->
<div class="sd-masthead">
  <a class="sd-masthead__name" href="{{ '/' | relative_url }}">
    Xiaoyu (Sara) Deng
    <span>Researcher</span>
  </a>
  <nav class="sd-masthead__nav" aria-label="Primary navigation">
    <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>About</a>
    <a href="{{ '/publications/' | relative_url }}" {% if page.url contains 'publications' %}class="active"{% endif %}>Publications</a>
    <a href="{{ '/portfolio/' | relative_url }}" {% if page.url contains 'portfolio' %}class="active"{% endif %}>Portfolio</a>
    <a href="{{ '/cv/' | relative_url }}" {% if page.url contains 'cv' %}class="active"{% endif %}>CV</a>
    <a href="{{ '/year-archive/' | relative_url }}" {% if page.url contains 'year-archive' or page.url contains 'posts' %}class="active"{% endif %}>Blog</a>
  </nav>
</div>
